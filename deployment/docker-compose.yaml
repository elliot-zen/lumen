services:
  postgres:
    image: postgres:16
    container_name: lumen-postgres
    environment:
      POSTGRES_DB: lumen
      POSTGRES_USER: lumen
      POSTGRES_PASSWORD: lumen
    ports:
      - "5432:5432"
    volumes:
      - lumen-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumen -d lumen"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  lumen-postgres-data:
